<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#070b15;--surf:#0e1520;--surf2:#131c2c;--border:#1a2840;
  --text:#dce4f0;--muted:#5a6a88;
  --gold:#f0b429;--gold-dim:rgba(240,180,41,0.12);--gold-b:rgba(240,180,41,0.3);
  --green:#10b981;--green-dim:rgba(16,185,129,0.12);--green-b:rgba(16,185,129,0.3);
  --red:#ef4444;--red-dim:rgba(239,68,68,0.12);--red-b:rgba(239,68,68,0.3);
  --orange:#f97316;--blue:#3b82f6;
  --max:480px;
}
body{background:var(--bg) !important;color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;color-scheme:dark;}
html{background:var(--bg) !important;}

#app{min-height:100vh;}
#app > div {max-width:var(--max);margin:0 auto;position:relative;}

@media(min-width:520px){
  body{background:#040810;}
  #app > div {
    box-shadow:0 0 80px rgba(0,0,0,0.8);
    background:var(--bg);
    min-height:100vh;
  }
  .header{border-radius:0;}
  .footer{max-width:var(--max);left:50%;transform:translateX(-50%);}
}

@media(min-width:520px){
  .card{padding:18px;font-size:14px;}
  .plan-body{font-size:15px;}
  .tab-btn{font-size:9px;}
  .content{padding:18px 18px 90px;}
  input,textarea{font-size:14px;}
  .btn{font-size:16px;}
}

.card{background:var(--surf);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;}
.card-gold{background:var(--gold-dim);border:2px solid var(--gold-b);}
.card-green{background:var(--green-dim);border:2px solid var(--green-b);}
.card-red{background:var(--red-dim);border:1px solid var(--red-b);}
.card-dark{background:var(--surf2);border:1px solid var(--border);}
.btn{width:100%;border:none;border-radius:12px;padding:16px;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit;}
.btn-gold{background:var(--gold);color:var(--bg);}
.btn-green{background:var(--green);color:var(--bg);}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--muted);}
.label{font-size:10px;color:var(--gold);font-weight:700;letter-spacing:2px;margin-bottom:6px;}
.big{font-family:Georgia,serif;font-size:28px;font-weight:900;color:var(--gold);}
.row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;}
.row-label{color:var(--muted);}
.track-wrap{background:var(--surf2);border-radius:99px;overflow:hidden;}
.track-fill{border-radius:99px;transition:width 0.6s;}
input,textarea{background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;font-family:inherit;width:100%;outline:none;}
input:focus,textarea:focus{border-color:var(--gold);}
textarea{resize:vertical;min-height:72px;}
.chip{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;}
.center{text-align:center;}
.header{background:linear-gradient(160deg,#0e1d34,#0a1220);border-bottom:1px solid var(--border);padding:16px 16px 12px;position:sticky;top:0;z-index:100;box-shadow:0 4px 24px rgba(0,0,0,0.5);}
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surf);overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{flex:0 0 16.66%;padding:11px 2px;border:none;border-bottom:3px solid transparent;cursor:pointer;font-weight:700;font-size:7px;background:transparent;color:var(--muted);font-family:inherit;white-space:nowrap;text-align:center;transition:color 0.2s;}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
.content{padding:14px 14px 90px;}
.footer{font-size:9px;color:var(--muted);text-align:center;padding:8px 16px;position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);}
.screen{display:flex;flex-direction:column;min-height:100vh;padding:0 24px;max-width:var(--max);margin:0 auto;background:var(--bg);}
.screen-center{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
.opt-btn{width:100%;background:var(--surf);color:var(--text);border:1px solid var(--border);border-radius:12px;padding:14px 18px;font-size:14px;cursor:pointer;font-family:inherit;text-align:left;margin-bottom:8px;}
.opt-btn.sel{background:var(--gold);color:var(--bg);border-color:var(--gold);font-weight:900;}
.step-row{display:flex;gap:11px;padding:12px 13px;margin-bottom:7px;border-radius:12px;cursor:pointer;align-items:flex-start;border:1px solid var(--border);background:var(--surf);}
.step-row.done{background:var(--green-dim);border-color:var(--green-b);}
.check-box{width:24px;height:24px;border-radius:6px;flex-shrink:0;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:var(--bg);}
.check-box.done{background:var(--green);border-color:var(--green);}
.energy-btn{flex:1;padding:12px 6px;border:2px solid var(--border);border-radius:12px;background:var(--surf);cursor:pointer;font-family:inherit;text-align:center;}
.energy-btn.sel-high{background:rgba(16,185,129,0.15);border-color:var(--green);}
.energy-btn.sel-medium{background:rgba(249,115,22,0.12);border-color:var(--orange);}
.energy-btn.sel-low{background:rgba(239,68,68,0.12);border-color:var(--red);}
.plan-section{margin-bottom:14px;}
.plan-title{font-size:9px;color:var(--green);font-weight:700;letter-spacing:2px;margin-bottom:6px;}
.plan-body{font-size:14px;color:var(--text);line-height:1.8;}
.action-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
.action-num{color:var(--gold);font-weight:900;font-size:13px;flex-shrink:0;margin-top:1px;}
.cal-row{display:flex;gap:12px;padding:12px 14px;margin-bottom:8px;border-radius:12px;align-items:center;border:1px solid var(--border);background:var(--surf);}
.cal-row.urgent{background:var(--red-dim);border-color:var(--red-b);}
.cal-row.done{background:var(--green-dim);border-color:var(--green-b);}
.cal-btn{background:var(--surf2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:10px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;}
.cal-btn.added{background:var(--green-dim);border-color:var(--green);color:var(--green);}
.notif-row{display:flex;align-items:center;gap:14px;padding:16px;border-radius:14px;border:1px solid var(--border);background:var(--surf);cursor:pointer;margin-bottom:10px;}
.notif-row.on{background:var(--green-dim);border-color:var(--green-b);}
.toggle{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--bg);font-weight:900;flex-shrink:0;}
.toggle.on{background:var(--green);border-color:var(--green);}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;display:inline-block;margin:0 2px;}
.dot.done{background:var(--gold);}
.expand-detail{font-size:11px;color:var(--muted);line-height:1.5;margin-top:4px;display:none;}
.expand-detail.open{display:block;}
.sub-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;align-items:center;}
.sub-check{width:20px;height:20px;border-radius:5px;flex-shrink:0;border:2px solid var(--border);}
.sub-check.done{background:var(--green);border-color:var(--green);}
.streak-fire{font-size:24px;}
.install-banner{background:var(--gold-dim);border:1px solid var(--gold-b);border-radius:12px;padding:12px 14px;margin-bottom:10px;font-size:12px;color:var(--text);line-height:1.7;}
.bmc-btn{display:inline-flex;align-items:center;gap:8px;background:#FFDD00;color:#000000;border:none;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:800;cursor:pointer;text-decoration:none;font-family:inherit;}
.bmc-btn:hover{background:#f5d400;}
</style>
</head>

var KEY = 'nextstep-pwa-v1';
var DAY_KEY = 'nextstep-pwa-day';
var PLAN_KEY = 'nextstep-pwa-plans';
var FB_KEY = 'nextstep-pwa-feedback';

function save() {
  try {
    localStorage.setItem(KEY, JSON.stringify({
      profile: S.profile, checked: S.checked, subChecked: S.subChecked,
      notifPrefs: S.notifPrefs, calAdded: S.calAdded, dayChecked: S.dayChecked || {},
    }));
    localStorage.setItem(DAY_KEY, String(S.day));
    localStorage.setItem(PLAN_KEY, JSON.stringify(S.plans));
    localStorage.setItem(FB_KEY, JSON.stringify(S.feedback));
  } catch(e) {}
}

function load() {
  try {
    var raw = localStorage.getItem(KEY);
    if (raw) {
      var d = JSON.parse(raw);
      S.profile = d.profile || null;
      S.checked = d.checked || {};
      S.subChecked = d.subChecked || {};
      S.notifPrefs = d.notifPrefs || {};
      S.calAdded = d.calAdded || {};
      S.dayChecked = d.dayChecked || {};
    }
    S.day = parseInt(localStorage.getItem(DAY_KEY) || '1');
    S.viewDay = S.day;
    var plans = localStorage.getItem(PLAN_KEY);
    S.plans = plans ? JSON.parse(plans) : {};
    var fb = localStorage.getItem(FB_KEY);
    S.feedback = fb ? JSON.parse(fb) : [];
  } catch(e) {}
}

// --- Plan Generation --------------------------------------------------------
function generatePlan(profile, dayNum, isDay1, energy, completed, avoided, blocked) {
  var name = profile.name || 'Friend';
  var hasDebt = (profile.cd || 0) > 0;
  var tight = (profile.surplus || 0) < 500;
  var badCredit = (profile.credit || '').indexOf('580') >= 0 || (profile.credit || '').indexOf('Under') >= 0;
  var didSomething = completed && completed.trim().length > 3;
  var gotBlocked = blocked && blocked.trim().length > 3;
  var goal = profile.goal || 'get organized';
  var stress = profile.stress || '';

  var energyLine = '';
  if (energy === 'high') energyLine = 'Your energy is high today. Starting with the hardest thing on your list.';
  else if (energy === 'medium') energyLine = 'Your energy is moderate. Picking the most important thing you can actually do.';
  else if (energy === 'low') energyLine = 'Your energy is low today. One small win. That is all you need. Small is real progress.';

  var priority = '';
  if (isDay1) {
    if (stress) priority = name + '. You said: "' + stress.slice(0,60) + '". That is exactly where we start.';
    else if (hasDebt && badCredit) priority = name + ', your credit and debt are both bleeding. We stop the bleeding first.';
    else if (hasDebt) priority = name + ', your highest-rate card is costing you money every single day. Today we fight back.';
    else if (tight) priority = name + ', your margin is thin. One cut today creates breathing room for everything else.';
    else priority = name + ', you want to ' + goal.toLowerCase() + '. Today we build the first step of that road.';
  } else if (didSomething) {
    priority = name + ', you completed: ' + completed.slice(0,50) + '. That is momentum. Build on it today.';
  } else if (gotBlocked) {
    priority = name + ', ' + blocked.slice(0,50) + ' got in the way. Today we work around it with one smaller step.';
  } else {
    priority = name + ', you came back. That is already more than most people do. One thing today.';
  }

  var actions = [];
  if (isDay1) {
    if (energy === 'low') {
      actions.push('Open your bank app right now and screenshot your checking balance. 30 seconds. Done.');
      actions.push('Set a reminder for tomorrow at 8am. Tomorrow we decide what to do with that number -- it\'s costing you every day you wait.');
    } else if (energy === 'medium') {
      if (hasDebt) actions.push('Open your bank app. Find your highest-rate credit card. Screenshot the balance. You are going to attack this one first. Takes 60 seconds.');
      actions.push('Go to your phone Settings right now and remove Apple Pay or Google Pay access from one credit card. Takes 2 minutes.');
      actions.push('Set a reminder for tomorrow at 8am. Tomorrow we decide what to do with that number -- it\'s costing you every day you wait.');
    } else {
      if (hasDebt) actions.push('Open your bank app. Find your highest-rate credit card. Screenshot the balance. This is the one you attack first. 60 seconds.');
      actions.push('Go to phone Settings right now and remove Apple Pay or Google Pay access from every credit card. Debit only from this point. Takes 3 minutes.');
      actions.push('Set a reminder for tomorrow at 8am. Tomorrow we decide what to do with that number -- it\'s costing you every day you wait.');
    }
  } else if (didSomething) {
    if (energy === 'low') {
      actions.push('Write down the single next step after what you completed. Do not do it yet - just write it down. That counts.');
    } else {
      actions.push('Identify the exact next step after what you completed and take it today.');
      if (avoided && avoided.trim().length > 3) actions.push('Do the thing you avoided yesterday: ' + avoided.slice(0,40) + '. Do it in the next 2 hours.');
      if (hasDebt) actions.push('Make one extra payment toward your highest-rate card, even if it is just $25.');
    }
  } else {
    if (energy === 'low') {
      actions.push('One thing. The smallest version you can think of. Even 5 minutes counts.');
    } else {
      actions.push('Pick the single smallest step from your plan and do only that one thing today.');
      if (gotBlocked) actions.push('Remove what blocked you: ' + blocked.slice(0,40));
      actions.push('Set a 20-minute timer and work on your plan during that window only.');
    }
  }

  var momentum = '';
  if (isDay1) {
    momentum = stress ? 'Most people feel exactly what you are feeling and never open an app to fix it. You did. That is different.' : 'Day 1 is always the hardest. You showed up. Everything from here is easier than this moment.';
  } else if (didSomething) {
    momentum = 'You did the work yesterday. The plan advances. Keep the streak alive.';
  } else if (gotBlocked) {
    momentum = 'Getting blocked is not failure. Failure is not coming back. You came back.';
  } else {
    momentum = 'The plan does not care about yesterday. It only cares about the next step. Go get it.';
  }

  var avoid = [];
  if (hasDebt) avoid.push('Using any credit card today - cash or debit only');
  if (tight) avoid.push('Any unplanned purchase over $20 - every dollar matters right now');
  avoid.push('Waiting until you feel motivated - action creates motivation, not the other way around');

  return { name:name, day:dayNum, priority:priority, energyLine:energyLine, actions:actions.slice(0,3), momentum:momentum, avoid:avoid.slice(0,2), hasDebt:hasDebt };
}

// --- Calendar Export --------------------------------------------------------
function makeICS(step) {
  var now = new Date();
  var start = new Date(now);
  start.setDate(start.getDate() + 1);
  start.setHours(9,0,0,0);
  var end = new Date(start);
  end.setHours(9,30,0,0);
  var fmt = function(d) { return d.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,''); };
  return [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//NextStep//EN',
    'BEGIN:VEVENT',
    'UID:nextstep-' + step.id + '-' + Date.now() + '@nextstep.app',
    'DTSTAMP:' + fmt(now),
    'DTSTART:' + fmt(start),
    'DTEND:' + fmt(end),
    'SUMMARY:NextStep: ' + step.label,
    'DESCRIPTION:' + step.detail,
    'BEGIN:VALARM','ACTION:DISPLAY','DESCRIPTION:NextStep reminder','TRIGGER:-PT15M','END:VALARM',
    'END:VEVENT','END:VCALENDAR'
  ].join('\r\n');
}

function downloadICS(stepId) {
  var step = STEPS.find(function(s) { return s.id === stepId; });
  if (!step) return;
  var blob = new Blob([makeICS(step)], { type:'text/calendar;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = step.id + '.ics'; a.click();
  URL.revokeObjectURL(url);
  S.calAdded[stepId] = 'ics';
  save(); render();
}

function googleCal(stepId) {
  var step = STEPS.find(function(s) { return s.id === stepId; });
  if (!step) return;
  var now = new Date();
  var start = new Date(now); start.setDate(start.getDate() + 1); start.setHours(9,0,0,0);
  var end = new Date(start); end.setHours(9,30,0,0);
  var fmt = function(d) { return d.toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,''); };
  var url = 'https://calendar.google.com/calendar/r/eventedit?text=' + encodeURIComponent('NextStep: ' + step.label) + '&dates=' + fmt(start) + '/' + fmt(end) + '&details=' + encodeURIComponent(step.detail);
  window.open(url, '_blank');
  S.calAdded[stepId] = 'google';
  save(); render();
}

// --- Profile Builder --------------------------------------------------------
function buildProfile(a) {
  var n = function(id) { return parseInt(a[id]) || 0; };
  var th = n('takehome'), ch = n('checking'), cd = n('carddebt');
  var mg = n('rent') || 0;

  var sv = 0;
  if (a.savings === 'Less than $500') sv = 250;
  else if (a.savings === '$500 to $2,000') sv = 1000;
  else if (a.savings === 'More than $2,000') sv = 2000;

  var liquid = ch + sv;
  var minCard = Math.round(cd * 0.025);
  var oblig = mg + minCard + 500;
  var surplus = th - oblig - 400;

  var goal = a.goal || 'Get control of my money';
  var stress = a.blocker || '';

  var credit = '';
  if (cd > th * 6) credit = 'Under 580 - needs work';
  else if (cd > th * 3) credit = '580-669 - fair';
  else if (cd > 0) credit = '670-739 - good';
  else credit = '740+ - great';

  return {
    name: a.name||'Friend', goal: goal, stress: stress, credit: credit,
    timeline: 'I need help NOW', savings: a.savings || '$0',
    th: th, ch: ch, sv: sv, mg: mg, cd: cd,
    minCard: minCard, liquid: liquid, oblig: oblig, surplus: surplus
  };
}

function fmt(v) { return '$' + Math.round(Math.max(0, parseInt(v)||0)).toLocaleString(); }
function fmtSigned(v) { var n = Math.round(parseInt(v)||0); return (n<0?'-':'') + '$' + Math.abs(n).toLocaleString(); }

          '<div><div style="font-size:13px;font-weight:700">Call your credit card</div><div style="font-size:11px;color:var(--muted)">Script ready. Tap to see it first.</div></div>' +

          '<span id="callscript-arrow" style="color:var(--gold);font-size:14px">&#9660;</span>' +

          '<a href="tel:" style="display:block;text-align:center;background:var(--green);color:var(--bg);border-radius:10px;padding:12px;font-size:14px;font-weight:900;text-decoration:none">📞 Open Dialer &mdash; Script is above</a>' +

      html += '<div class="plan-section"><div class="plan-title">AVOID TODAY</div>';
      plan.avoid.forEach(function(a) {
        html += '<div style="font-size:13px;color:var(--text);padding:4px 0;line-height:1.6">&#8212; ' + a + '</div>';
      });
      html += '</div>';

      html += '<div style="font-size:14px;color:var(--text);line-height:1.9;white-space:pre-wrap">' + plan + '</div>';
    }

    var dayKey = 'day' + (S.day - 1);
    if (!S.dayChecked) S.dayChecked = {};
    if (!S.dayChecked[dayKey]) S.dayChecked[dayKey] = {};
    html += '<div style="height:1px;background:var(--green-b);margin:14px 0"></div>';
    html += '<div style="font-size:10px;color:var(--green);font-weight:700;letter-spacing:1px;margin-bottom:8px">MARK DONE TODAY &mdash; fresh each day</div>';
    STEPS.slice(0, 4).forEach(function(step) {
      var d = !!S.dayChecked[dayKey][step.id];
      html += '<div onclick="toggleDayCheck(\'' + dayKey + '\',\'' + step.id + '\')" style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;align-items:center">' +
        '<div style="width:20px;height:20px;border-radius:5px;flex-shrink:0;border:2px solid ' + (d?'var(--green)':'var(--border)') + ';background:' + (d?'var(--green)':'transparent') + ';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:var(--bg)">' + (d?'&#10003;':'') + '</div>' +
        '<div style="font-size:12px;color:' + (d?'var(--muted)':'var(--text)') + ';text-decoration:' + (d?'line-through':'none') + '">' + step.e + ' ' + step.label + '</div>' +
        '</div>';
    });

    html += '<div style="display:flex;gap:8px;margin-top:14px">';
    html += '<button class="btn btn-green" style="flex:1;padding:10px;font-size:12px" onclick="copyPlan()">Copy</button>';
    html += '<button class="btn btn-ghost" style="flex:1;padding:10px;font-size:12px" onclick="resetPlan()">Reset Day</button>';
    html += '</div></div>';
  }

  if (!plan && !isDay1) {
    html += '<div class="card card-dark center"><div style="font-size:13px;color:var(--muted);padding:10px 0">You came back. That is 90% of it.</div></div>';
  }

  return html;
}

function formatPlanText(plan) {
  if (typeof plan === 'string') return plan;
  var t = plan.name + "'s Plan - Day " + plan.day + '\n\n';
  t += 'TODAY\'S PRIORITY\n' + plan.priority + '\n\n';
  t += 'DO THIS TODAY\n' + plan.actions.map(function(a,i){ return (i+1)+'. '+a; }).join('\n') + '\n\n';
  t += 'MOMENTUM NOTE\n' + plan.momentum + '\n\n';
  t += 'AVOID TODAY\n' + plan.avoid.map(function(a){ return '- '+a; }).join('\n');
  return t;
}

function renderPlan() {
  var done = STEPS.filter(function(s){ return S.checked[s.id]; }).length;
  var pct = Math.round((done / STEPS.length) * 100);
  var next = STEPS.find(function(s){ return !S.checked[s.id]; });
  var weeks = [];
  STEPS.forEach(function(s){ if (weeks.indexOf(s.week)<0) weeks.push(s.week); });

  var html = '<div class="card card-gold center">' +
    '<div class="label">YOUR PROGRESS</div>' +
    '<div style="font-family:Georgia,serif;font-size:60px;color:var(--gold);line-height:1">' + pct + '%</div>' +
    '<div style="font-size:12px;color:var(--muted);margin-bottom:10px">' + done + ' of ' + STEPS.length + ' steps complete</div>' +
    '<div class="track-wrap" style="height:10px"><div class="track-fill" style="height:10px;width:' + pct + '%;background:var(--gold)"></div></div>';

  if (next) {
    html += '<div style="background:var(--surf);border-radius:10px;padding:12px;margin-top:12px;text-align:left">' +
      '<div style="font-size:9px;color:var(--gold);letter-spacing:1.5px;margin-bottom:4px;font-weight:700">UP NEXT</div>' +
      '<div style="font-size:13px;font-weight:700;margin-bottom:3px">' + next.e + ' ' + next.label + '</div>' +
      '<div style="font-size:11px;color:var(--muted)">' + next.detail.slice(0,80) + '</div>' +
      '</div>';
  }
  html += '</div>';

  weeks.forEach(function(week) {
    html += '<div class="label" style="margin:14px 0 8px">' + week.toUpperCase() + '</div>';
    STEPS.filter(function(s){ return s.week===week; }).forEach(function(step) {
      var d = !!S.checked[step.id];
      var exp = S.expandedStep === step.id;
      var calDone = !!S.calAdded[step.id];
      html += '<div class="step-row' + (d?' done':'') + '" onclick="toggleCheck(\'' + step.id + '\')">' +
        '<div class="check-box' + (d?' done':'') + '">' + (d?'&#10003;':'') + '</div>' +

        '<div style="font-size:13px;font-weight:700;margin-bottom:3px;color:' + (d?'var(--muted)':'var(--text)') + ';text-decoration:' + (d?'line-through':'none') + '">' + step.e + ' ' + step.label + '</div>' +
        '<div class="expand-detail' + (exp&&!d?' open':'') + '">' + step.detail + '</div>' +
        (!d ? '<div style="display:flex;gap:6px;margin-top:6px" onclick="event.stopPropagation()">' +
          '<button class="cal-btn' + (calDone?' added':'') + '" onclick="downloadICS(\'' + step.id + '\')">' + (calDone?'Added &#10003;':'\uD83D\uDCC5 .ics') + '</button>' +
          '<button class="cal-btn" onclick="googleCal(\'' + step.id + '\')">\uD83D\uDD17 Google Cal</button>' +
          '<button class="cal-btn" onclick="toggleExpand(\'' + step.id + '\')">' + (exp?'Less':'Why?') + '</button>' +
          '</div>' : '') +
        '</div></div>';
    });
  });
  return html;
}

     ['partial','I did some of it','var(--orange)','rgba(249,115,22,0.1)','rgba(249,115,22,0.3)'],

    html += '<div class="card">' +
      '<div style="font-size:13px;font-weight:700;margin-bottom:4px">What would have made it easier?</div>' +
      '<div style="font-size:11px;color:var(--muted);margin-bottom:6px">What should the app have done differently?</div>' +

      '<button class="btn btn-ghost" style="flex:1;padding:14px;font-size:13px" onclick="S.fbScreen=\'view\';render()">Cancel</button>' +
      '</div>';
    return html;

  html += '<div class="card card-dark">' +
    '<div class="label">DAILY FEEDBACK LOG</div>' +
    '<div style="font-size:13px;color:var(--text);line-height:1.7;margin-bottom:12px">Log what you actually did each day. Be honest. Your feedback is what separates a good idea from a real product.</div>' +
    '<button class="btn btn-gold" onclick="S.fbScreen=\'log\';S.fbDidIt=\'yes\';S.fbBlocker=\'\';S.fbEasier=\'\';render()">+ Log Day ' + S.day + ' Feedback</button></div>';

  if (S.fbSubmitted) {
    html += '<div class="card card-green center">' +
      '<div style="font-size:22px;margin-bottom:6px">&#10003;</div>' +
      '<div style="font-size:14px;color:var(--green);font-weight:700">Feedback logged for Day ' + S.day + '</div>' +
      '<div style="font-size:12px;color:var(--muted);margin-top:4px">Come back tomorrow. Keep going.</div></div>';

  if (S.feedback.length > 0) {
    var yesCount = S.feedback.filter(function(e){ return e.didIt==='yes'; }).length;

    var noCount = S.feedback.filter(function(e){ return e.didIt==='no'; }).length;
    html += '<div class="card">' +

      '<div class="row"><span class="row-label">Skipped</span><span style="font-weight:700;color:var(--red)">' + noCount + ' day' + (noCount!==1?'s':'') + '</span></div>' +
      '</div>';

    html += '<div class="label" style="margin:16px 0 8px">FEEDBACK HISTORY</div>';
    S.feedback.slice().reverse().forEach(function(entry) {
      var dc = entry.didIt==='yes'?'var(--green)':entry.didIt==='partial'?'var(--orange)':'var(--red)';

        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +

      html += '</div>';

    html += '<div class="card card-dark center">' +
      '<div style="font-size:28px;margin-bottom:8px">📋</div>' +
      '<div style="font-size:13px;color:var(--muted);line-height:1.8">No feedback logged yet. Use the app for a day and come back here. Your honest experience is the product.</div></div>';
  }

  return html;
}

      (!d?'<div style="font-size:11px;color:var(--muted);line-height:1.5">' + b.why + '</div>':'') +
      '</div>' +
      '<div style="width:24px;height:24px;border-radius:50%;flex-shrink:0;border:2px solid ' + (d?'var(--green)':'var(--border)') + ';background:' + (d?'var(--green)':'transparent') + ';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;color:var(--bg)">' + (d?'&#10003;':'') + '</div>' +
      '</div>';
  });

  html += '<div style="height:1px;background:var(--border);margin:20px 0"></div>';
  html += '<div class="card">' +
    '<div style="font-weight:800;font-size:14px;margin-bottom:6px;color:var(--orange)">Subscription Audit</div>' +
    '<div style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6">Check off every subscription you actually pay for. Then cancel the ones you forgot about.</div>';
  SUBS.forEach(function(sub, i) {
    var sid = 'sub_' + i;
    var checked = !!S.subChecked[sid];
    html += '<div class="sub-item" onclick="toggleSub(\'' + sid + '\')">' +
      '<div class="sub-check' + (checked?' done':'') + '">' + (checked?'<div style="color:white;font-size:11px;text-align:center;line-height:18px">&#10003;</div>':'') + '</div>' +
      '<div style="font-size:13px;color:' + (checked?'var(--muted)':'var(--text)') + ';text-decoration:' + (checked?'line-through':'none') + '">' + sub + '</div>' +
      '</div>';
  });
  html += '</div>';

  html += '<div class="card">' +
    '<div style="font-weight:800;font-size:14px;margin-bottom:6px;color:var(--blue)">Bill Negotiation Scripts</div>' +
    '<div style="font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.6">Read these word for word. They work 70% of the time.</div>';
  BILL_SCRIPTS.forEach(function(script, i) {
    var open = S.expandedScript === i;
    html += '<div style="border-bottom:1px solid var(--border);padding:10px 0">' +
      '<div onclick="S.expandedScript=' + (open?'null':i) + ';render()" style="display:flex;justify-content:space-between;align-items:center;cursor:pointer">' +
      '<div style="font-size:13px;font-weight:700">' + script.name + '</div>' +
      '<div style="font-size:11px;color:var(--gold);">' + (open?'Hide':'Show script') + '</div>' +
      '</div>' +
      (open?'<div style="font-size:13px;color:var(--text);line-height:1.8;margin-top:8px;padding:12px;background:var(--surf2);border-radius:8px;font-style:italic">"' + script.script + '"</div>':'') +
      '</div>';
  });
  html += '</div>';

  html += '<div class="card card-dark center" style="margin-top:8px">' +
    '<div style="font-size:13px;color:var(--muted);margin-bottom:12px">Want to start over with new numbers?</div>' +
    '<button class="btn btn-ghost" onclick="resetAll()">Restart from scratch</button></div>';

  return html;
}

// --- Event Handlers ----------------------------------------------------------
function startOnboarding() {
  S.screen='onboarding'; S.step=0; S.diagStep=0;
  render();
}

function onInput(v) { S.answers[QUESTIONS[S.step].id] = v; }

function nextStep() {
  var q = QUESTIONS[S.step];
  var val = S.answers[q.id] || '';

  if (q.id === 'name' && !val.trim()) {
    showNudge('qinput', 'We need your name to personalize your plan.'); return;
  }
  if (q.type === 'dollar' && (!val || parseInt(val.replace(/[^0-9]/g,'')) === 0) && q.id === 'takehome') {
    showNudge('qinput', 'Your income is required to build your plan.'); return;
  }

  if (!val) S.answers[q.id] = '0';

  if (S.step < QUESTIONS.length - 1) {
    S.step++;
    render();
    setTimeout(function() { var el = document.getElementById('qinput'); if(el) el.focus(); }, 50);
  } else {
    S.screen = 'chat';
    S.diagStep = 0;
    render();
    setTimeout(function() { var el = document.getElementById('diaginput'); if(el) el.focus(); }, 50);
  }
}

function showNudge(inputId, msg) {
  var el = document.getElementById(inputId);
  if (el) {
    el.style.border = '2px solid var(--red)';
    el.placeholder = msg;
    el.focus();
    setTimeout(function() {
      el.style.border = '2px solid var(--gold)';
      el.placeholder = '';
    }, 2500);
  }
}

function prevStep() {
  if (S.screen === 'chat') { S.screen='onboarding'; S.step=QUESTIONS.length-1; render(); return; }
  if (S.step > 0) { S.step--; render(); }
}

function pickDiag(opt) {
  S.answers[DIAG[S.diagStep].id] = opt;
  setTimeout(function() { nextDiag(); }, 120);
}

function nextDiag() {
  var q = DIAG[S.diagStep];
  var val = S.answers[q.id] || '';

  if (q.id === 'goal' && !val) {
    showNudge('diaginput', 'Please pick your main goal.'); return;
  }
  if (q.id === 'rent' && (!val || parseInt(val.replace(/[^0-9]/g,'')) === 0)) {
    showNudge('diaginput', 'Enter your monthly rent or biggest bill.'); return;
  }

  if (!val) S.answers[q.id] = '';

  if (S.diagStep < DIAG.length - 1) {
    S.diagStep++;
    render();
    setTimeout(function() { var el = document.getElementById('diaginput'); if(el) el.focus(); }, 50);
  } else {
    S.screen = 'notif';
    render();
  }
}

function prevDiag() {
  if (S.diagStep > 0) { S.diagStep--; render(); }
  else { S.screen='onboarding'; S.step=QUESTIONS.length-1; render(); }
}

function scrollChat() {}

function toggleNotif(id) {
  S.notifPrefs[id] = !S.notifPrefs[id];
  render();
}

function finishNotif() {
  S.profile = buildProfile(S.answers);
  if (S.notifPrefs.checkin) requestNativeNotif();
  S.screen = 'dashboard';
  S.tab = 'today';
  if (S.day === 1 && !S.plans[1]) {
    var plan = generatePlan(S.profile, 1, true, 'medium', '', '', '');
    S.plans[1] = plan;
    S.viewDay = 1;
    S.todayAnswers = { completed:'', avoided:'', blocked:'' };
    S.energy = null;
  }
  save();
  render();
}

function setTab(tab) { S.tab=tab; render(); }

function navDay(dir) {
  var next = S.viewDay + dir;
  if (next >= 1 && next <= S.day) { S.viewDay=next; S.editing=false; render(); }
}

function setEnergy(e) { S.energy=e; render(); }

function genPlan() {
  if (S.day === 1 && S.plans[1]) {
    S.day = 2;
    S.viewDay = 2;
    S.todayAnswers = { completed:'', avoided:'', blocked:'' };
    S.energy = null;
    save();
    render();
    return;
  }
  var isDay1 = S.day === 1;
  if (!isDay1 && !S.energy) { alert('Please select your energy level first.'); return; }
  var energy = S.energy || 'medium';
  var plan = generatePlan(S.profile, S.day, isDay1, energy, S.todayAnswers.completed, S.todayAnswers.avoided, S.todayAnswers.blocked);
  S.plans[S.day] = plan;
  var nextDay = S.day + 1;
  S.day = nextDay;
  S.viewDay = nextDay;
  S.todayAnswers = { completed:'', avoided:'', blocked:'' };
  S.energy = null;
  scheduleReminder();
  save();
  S.viewDay = S.day - 1;
  render();
}

function toggleDayCheck(dayKey, stepId) {
  if (!S.dayChecked) S.dayChecked = {};
  if (!S.dayChecked[dayKey]) S.dayChecked[dayKey] = {};
  var wasChecked = !!S.dayChecked[dayKey][stepId];
  S.dayChecked[dayKey][stepId] = !wasChecked;
  if (!wasChecked) S.checked[stepId] = true;
  save();
  render();
}

function toggleScript(id) {
  var el = document.getElementById(id);
  var arrow = document.getElementById(id + '-arrow');
  if (!el) return;
  var showing = el.style.display !== 'none';
  el.style.display = showing ? 'none' : 'block';
  if (arrow) arrow.innerHTML = showing ? '&#9660;' : '&#9650;';
}

function toggleCheck(id) {
  S.checked[id] = !S.checked[id];
  save();
  render();
}

function toggleSub(id) {
  S.subChecked[id] = !S.subChecked[id];
  save();
  render();
}

function toggleExpand(id) {
  S.expandedStep = (S.expandedStep === id) ? null : id;
  render();
}

function startEdit() { S.editText = formatPlanText(S.plans[S.viewDay]); S.editing=true; render(); }

function saveEdit() {
  var box = document.getElementById('editbox');
  S.plans[S.viewDay] = box ? box.value : S.editText;
  S.editing = false;
  save();
  render();
}

function cancelEdit() { S.editing=false; render(); }

function copyPlan() {
  var plan = S.plans[S.viewDay-1] || S.plans[S.day-1];
  if (!plan) return;
  var text = typeof plan === 'object' ? formatPlanText(plan) : plan;
  if (navigator.clipboard) navigator.clipboard.writeText(text).then(function(){ alert('Copied!'); });
}

function resetPlan() {
  if (!confirm('Reset this day? You will need to generate a new plan.')) return;
  var d = S.day-1;
  delete S.plans[d];
  S.day = d;
  S.viewDay = d;
  save();
  render();
}

function submitFeedback() {
  var entry = {
    day: S.day-1,
    name: S.profile.name,
    date: new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}),
    didIt: S.fbDidIt || 'yes',
    blocker: S.fbBlocker || '',
    easier: S.fbEasier || '',
  };
  S.feedback.push(entry);
  S.fbSubmitted = true;
  S.fbScreen = 'view';
  save();
  render();
}

function resetAll() {
  localStorage.clear();
  S = {
    screen:'landing', step:0, diagStep:0, answers:{}, profile:null, tab:'today',
    checked:{}, subChecked:{}, dayChecked:{},
    day:1, viewDay:1, plans:{},
    feedback:[], fbScreen:'view', fbDidIt:'yes', fbBlocker:'', fbEasier:'', fbSubmitted:false,
    energy:null, notifPrefs:{}, editing:false, editText:'', calAdded:{},
    expandedStep:null, expandedScript:null,
    todayAnswers:{completed:'',avoided:'',blocked:''},
  };
  render();
}

// --- Init --------------------------------------------------------------------
function init() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(regs) {
      regs.forEach(function(r) { r.unregister(); });
    });
  }

  var urlTab = new URLSearchParams(window.location.search).get('tab');
  load();

  if (S.profile) {
    S.screen = 'dashboard';
    if (urlTab) S.tab = urlTab;
  } else {
    S.screen = 'landing';
  }

  render();
}

document.addEventListener('DOMContentLoaded', function() { init(); });
</script>
</body>
</html>
